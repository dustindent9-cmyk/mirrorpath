<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="28" ry="28" fill="#6c63ff"/>
  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="40%" r="55%">
    <stop offset="0%"   stop-color="#9d97ff" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#6c63ff" stop-opacity="0"/>
  </radialGradient>
  <rect width="128" height="128" rx="28" ry="28" fill="url(#glow)"/>
  <!-- ✦ star / sparkle symbol -->
  <text
    x="64"
    y="82"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, Segoe UI, system-ui, sans-serif"
    font-size="68"
    fill="#ffffff"
    font-weight="600"
  >✦</text>
</svg>
